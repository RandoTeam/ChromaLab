name: Build Check

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile Kotlin Desktop
        run: ./gradlew :composeApp:compileKotlinDesktop --no-daemon --stacktrace

      - name: Assemble Android Main
        run: ./gradlew :composeApp:assembleAndroidMain --no-daemon --stacktrace

      - name: Assemble Android Debug
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace

      - name: Run Desktop Tests
        run: ./gradlew :composeApp:desktopTest --no-daemon --stacktrace
